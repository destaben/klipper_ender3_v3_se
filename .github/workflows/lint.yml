name: Lint

"on":
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  shellcheck:
    name: ShellCheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run ShellCheck
        uses: ludeeus/action-shellcheck@2.0.0
        with:
          scandir: '.'

  hadolint:
    name: Hadolint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Lint Dockerfile-klipper
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: Dockerfile-klipper
          failure-threshold: error
      - name: Lint Dockerfile-moonraker
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: Dockerfile-moonraker
          failure-threshold: error

  docker-compose-validate:
    name: Docker Compose Validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate docker-compose.yaml
        run: docker compose config --quiet

  yamllint:
    name: YAML Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run yamllint
        uses: ibiqlik/action-yamllint@v3
        with:
          file_or_dir: '.'
          config_data: |
            extends: default
            rules:
              document-start: disable
              line-length:
                max: 150
              truthy:
                allowed-values: ['true', 'false', 'on', 'off']
