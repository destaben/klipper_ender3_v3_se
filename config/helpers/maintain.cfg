[maintain]
interval: 300

# Lubricate XY rods
[maintain xyrods]
label: XY smooth rods
trigger: print_time
threshold: 250
message: Lubricate XY smooth rods

# Extruder maintenance
[maintain extruder]
label: Extruder maintenance
trigger: filament
threshold: 700
message: Clean extruder gears and tighten extruder bolts

# Cutter blade maintenance (approximate - primary cut tracking via CUT_COUNT_INCREMENT)
[maintain cutter_blade]
label: Cutter blade
trigger: filament
threshold: 150
message: Replace the filament cutter blade and run RESET_CUT_COUNT