# Filament load/unload macros for standalone use (without MMU).
# These macros provide a convenient way to load or unload filament
# from the extruder. For multi-material use, see sp_mmu.cfg instead.

[gcode_macro LOAD_FILAMENT]
description: Heat the nozzle and load filament into the extruder
gcode:
    {% set temp = params.TEMP|default(200)|int %}
    {% set length = params.LENGTH|default(80)|float %}
    {% set speed = params.SPEED|default(5)|int %}
    {% set purge = params.PURGE|default(25)|float %}
    SAVE_GCODE_STATE NAME=load_state
    M117 Heating to {temp}C...
    M109 S{temp}
    M117 Loading filament...
    M83                          ; Relative extrusion
    G1 E{length} F{speed * 60}  ; Load filament into extruder
    G1 E{purge} F150             ; Slowly purge to confirm load
    M117 Filament loaded
    RESTORE_GCODE_STATE NAME=load_state

[gcode_macro UNLOAD_FILAMENT]
description: Heat the nozzle and unload filament from the extruder
gcode:
    {% set temp = params.TEMP|default(200)|int %}
    {% set length = params.LENGTH|default(80)|float %}
    {% set speed = params.SPEED|default(5)|int %}
    SAVE_GCODE_STATE NAME=unload_state
    M117 Heating to {temp}C...
    M109 S{temp}
    M117 Unloading filament...
    M83                          ; Relative extrusion
    G1 E10 F300                  ; Extrude a bit to shape the tip
    G1 E-{length} F{speed * 60} ; Retract filament from extruder
    M117 Filament unloaded
    RESTORE_GCODE_STATE NAME=unload_state
