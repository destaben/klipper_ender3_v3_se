# Calibration helper macros.
# These provide convenient wrappers for common calibration tasks
# so that users can run them from the Mainsail/Fluidd UI easily.

[gcode_macro CALIBRATE_INPUT_SHAPER]
description: Run input shaper resonance test on X and Y axes
gcode:
    {% set axis = params.AXIS|default("all")|string|lower %}
    M117 Starting input shaper calibration...
    G28
    {% if axis == "x" %}
        SHAPER_CALIBRATE AXIS=X
    {% elif axis == "y" %}
        SHAPER_CALIBRATE AXIS=Y
    {% else %}
        SHAPER_CALIBRATE
    {% endif %}
    M117 Input shaper calibration complete. Run SAVE_CONFIG to apply.

[gcode_macro TEST_SPEED]
description: Test printer speed and acceleration limits
gcode:
    {% set speed = params.SPEED|default(200)|int %}
    {% set accel = params.ACCEL|default(4000)|int %}
    {% set iterations = params.ITERATIONS|default(5)|int %}
    {% set bound = params.BOUND|default(20)|int %}
    {% set x_min = printer.toolhead.axis_minimum.x + bound %}
    {% set x_max = printer.toolhead.axis_maximum.x - bound %}
    {% set y_min = printer.toolhead.axis_minimum.y + bound %}
    {% set y_max = printer.toolhead.axis_maximum.y - bound %}
    SAVE_GCODE_STATE NAME=test_speed_state
    G28
    G90
    SET_VELOCITY_LIMIT VELOCITY={speed} ACCEL={accel} ACCEL_TO_DECEL={accel / 2}
    G1 X{x_min} Y{y_min} Z50 F{speed * 60}
    M117 Testing speed: {speed}mm/s accel: {accel}mm/s2
    {% for i in range(iterations) %}
        G1 X{x_min} Y{y_min} F{speed * 60}
        G1 X{x_max} Y{y_max} F{speed * 60}
        G1 X{x_min} Y{y_max} F{speed * 60}
        G1 X{x_max} Y{y_min} F{speed * 60}
    {% endfor %}
    G1 X{x_min} Y{y_min} F{speed * 60}
    M117 Speed test complete
    RESTORE_GCODE_STATE NAME=test_speed_state

[gcode_macro FULL_CALIBRATION]
description: Run a complete calibration sequence (home, bed mesh, PID, input shaper)
gcode:
    {% set bed_temp = params.BED_TEMP|default(55)|int %}
    {% set extruder_temp = params.EXTRUDER_TEMP|default(205)|int %}
    M117 Starting full calibration...
    G28                                           ; Home all axes
    M117 Calibrating bed mesh...
    BED_MESH_CALIBRATE                            ; Generate a new bed mesh
    M117 Running extruder PID tune...
    PID_CALIBRATE HEATER=extruder TARGET={extruder_temp}
    M117 Running bed PID tune...
    PID_CALIBRATE HEATER=heater_bed TARGET={bed_temp}
    M117 Full calibration complete. Run SAVE_CONFIG to apply.
