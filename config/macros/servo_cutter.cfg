[servo my_servo]
pin: PICO_MMU: PB3
maximum_servo_angle: 180
minimum_pulse_width: 0.0005
maximum_pulse_width: 0.0025
initial_angle: 90

[gcode_macro SET_SERVO_ANGLE]
gcode:
    SET_SERVO SERVO=my_servo ANGLE={params.ANGLE|default(90)}


# ---- Cutter blade maintenance ----

[gcode_macro _CUTTER_VARS]
description: Cutter blade configuration variables
variable_blade_max_cuts: 5000  # Number of cuts before blade replacement is recommended (standard snap-off/utility blade)
gcode:


[gcode_macro CUT_COUNT_INCREMENT]
description: Increment the cutter blade cut counter and warn when maintenance is due
gcode:
  {% set vars = printer['gcode_macro _CUTTER_VARS'] %}
  {% set cut_count = printer.save_variables.variables.cut_count | default(0) | int %}
  {% set new_count = cut_count + 1 %}
  SAVE_VARIABLE VARIABLE=cut_count VALUE={new_count}
  {% if new_count >= vars.blade_max_cuts %}
    RESPOND TYPE=error MSG="BLADE MAINTENANCE REQUIRED: {new_count} cuts performed. Please replace the cutter blade and run RESET_CUT_COUNT."
  {% elif new_count % 500 == 0 %}
    RESPOND MSG="Cutter: {new_count}/{vars.blade_max_cuts} cuts ({vars.blade_max_cuts - new_count} remaining)"
  {% endif %}


[gcode_macro RESET_CUT_COUNT]
description: Reset the cut counter after replacing the cutter blade
gcode:
  SAVE_VARIABLE VARIABLE=cut_count VALUE=0
  UPDATE_MAINTENANCE NAME=cutter_blade
  RESPOND MSG="Cutter: Cut count reset to 0. Blade replacement acknowledged."


[gcode_macro CUT_COUNT_STATUS]
description: Display the current cutter blade cut count and remaining cuts
gcode:
  {% set vars = printer['gcode_macro _CUTTER_VARS'] %}
  {% set cut_count = printer.save_variables.variables.cut_count | default(0) | int %}
  {% set remaining = vars.blade_max_cuts - cut_count %}
  {% if remaining <= 0 %}
    RESPOND TYPE=error MSG="Cutter blade: {cut_count} cuts done — MAINTENANCE REQUIRED (replace blade and run RESET_CUT_COUNT)"
  {% else %}
    RESPOND MSG="Cutter blade: {cut_count}/{vars.blade_max_cuts} cuts ({remaining} remaining)"
  {% endif %}