[servo my_servo]
pin: PICO_MMU: PB3
maximum_servo_angle: 180
minimum_pulse_width: 0.0005
maximum_pulse_width: 0.0025
initial_angle: 90

[gcode_macro SET_SERVO_ANGLE]
gcode:
    SET_SERVO SERVO=my_servo ANGLE={params.ANGLE|default(90)}


# ---- Cutter blade maintenance ----

[gcode_macro _CUTTER_VARS]
description: Cutter blade configuration variables
variable_blade_max_cuts: 5000  # Number of cuts before blade replacement is recommended (standard snap-off/utility blade)
gcode:


[gcode_macro CUT_COUNT_INCREMENT]
description: Increment the cutter blade cut counter and warn when maintenance is due
gcode:
  {% set vars = printer['gcode_macro _CUTTER_VARS'] %}
  {% set cut_count = printer.save_variables.variables.cut_count | default(0) | int %}
  {% set new_count = cut_count + 1 %}
  SAVE_VARIABLE VARIABLE=cut_count VALUE={new_count}
  {% if new_count >= vars.blade_max_cuts %}
    RESPOND TYPE=error MSG="BLADE MAINTENANCE REQUIRED: {new_count} cuts performed. Please replace the cutter blade and run RESET_CUT_COUNT."
  {% elif new_count % 500 == 0 %}
    RESPOND MSG="Cutter: {new_count}/{vars.blade_max_cuts} cuts ({vars.blade_max_cuts - new_count} remaining)"
  {% endif %}


[gcode_macro RESET_CUT_COUNT]
description: Reset the cut counter after replacing the cutter blade
gcode:
  SAVE_VARIABLE VARIABLE=cut_count VALUE=0
  UPDATE_MAINTENANCE NAME=cutter_blade
  RESPOND MSG="Cutter: Cut count reset to 0. Blade replacement acknowledged."


[gcode_macro CUT_FILAMENT]
description: Manually trigger a filament cut. Use RETRACT=0 to skip filament retraction (e.g. for blade testing only).
gcode:
  {% set sp = printer['gcode_macro _SP_VARS'] %}
  {% set cutter = printer['gcode_macro _SP_TIP_FORM'] %}
  {% set do_retract = params.RETRACT | default(1) | int %}
  {% set fil_cut_position = sp.dist_extruder_to_meltzone - sp.dist_filament_park - sp.tip_length_below_cut %}

  {% set clear_move = "" %}
  {% if cutter.clear_position_x != -99 %} {% set clear_move = clear_move + 'X' ~ cutter.clear_position_x ~ ' ' %} {% endif %}
  {% if cutter.clear_position_y != -99 %} {% set clear_move = clear_move + 'Y' ~ cutter.clear_position_y ~ ' ' %} {% endif %}

  {% set cut_move = "" %}
  {% if cutter.cut_position_x != -99 %} {% set cut_move = cut_move + 'X' ~ cutter.cut_position_x ~ ' ' %} {% endif %}
  {% if cutter.cut_position_y != -99 %} {% set cut_move = cut_move + 'Y' ~ cutter.cut_position_y ~ ' ' %} {% endif %}

  {% if not "x" in printer.toolhead.homed_axes or not "y" in printer.toolhead.homed_axes %}
    G28 X Y
  {% endif %}

  {% if not "z" in printer.toolhead.homed_axes %}
    RESPOND MSG="WARNING: Z not homed, resetting Z to 10 to allow moves"
    SET_KINEMATIC_POSITION Z=10
  {% endif %}

  G90
  M83

  {% if cutter.z_hop > 0 %}
    {% if "z" in printer.toolhead.homed_axes %}
      {% set hop = [printer.toolhead.axis_maximum.z, printer.gcode_move.gcode_position.z + cutter.z_hop] | min %}
      G0 Z{hop}
    {% endif %}
  {% endif %}

  {% set pos = printer.toolhead.position %}
  {% set x_cur = pos[0]|float %}
  {% if x_cur >= cutter.clear_position_x|float %}
    G90
    G0 X{cutter.clear_position_x - 10}
  {% endif %}

  SET_SERVO_ANGLE ANGLE=7
  G4 P500
  G0 {clear_move} F{60 * cutter.approach_speed}

  {% if do_retract == 1 %}
    G0 E-{fil_cut_position} F{60 * cutter.filament_retract_speed}
  {% endif %}

  G0 {cut_move} F{60 * cutter.cut_speed}
  G1 E-1.0 F1000
  G4 P1000
  CUT_COUNT_INCREMENT
  G0 {clear_move} F{60 * cutter.approach_speed}

  SET_SERVO_ANGLE ANGLE=90
  M400
  RESPOND MSG="Cutter: Manual cut complete."


[gcode_macro CUT_COUNT_STATUS]
description: Display the current cutter blade cut count and remaining cuts
gcode:
  {% set vars = printer['gcode_macro _CUTTER_VARS'] %}
  {% set cut_count = printer.save_variables.variables.cut_count | default(0) | int %}
  {% set remaining = vars.blade_max_cuts - cut_count %}
  {% if remaining <= 0 %}
    RESPOND TYPE=error MSG="Cutter blade: {cut_count} cuts done — MAINTENANCE REQUIRED (replace blade and run RESET_CUT_COUNT)"
  {% else %}
    RESPOND MSG="Cutter blade: {cut_count}/{vars.blade_max_cuts} cuts ({remaining} remaining)"
  {% endif %}