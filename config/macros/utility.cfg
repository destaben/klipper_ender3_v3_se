# Utility macros for diagnostics and convenience.

[gcode_macro PRINT_INFO]
description: Display current printer status and settings
gcode:
    {% set extruder = printer.extruder %}
    {% set bed = printer.heater_bed %}
    {% set toolhead = printer.toolhead %}
    {% set mesh = printer.bed_mesh %}
    {action_respond_info("=== Printer Info ===")}
    {action_respond_info("Extruder: %.1f°C / %.1f°C" % (extruder.temperature, extruder.target))}
    {action_respond_info("Bed:      %.1f°C / %.1f°C" % (bed.temperature, bed.target))}
    {action_respond_info("Position: X=%.2f Y=%.2f Z=%.2f" % (toolhead.position.x, toolhead.position.y, toolhead.position.z))}
    {action_respond_info("Pressure advance: %.4f" % (extruder.pressure_advance))}
    {% if mesh.profile_name %}
        {action_respond_info("Bed mesh: %s" % (mesh.profile_name))}
    {% else %}
        {action_respond_info("Bed mesh: not loaded")}
    {% endif %}

[gcode_macro BEEP]
description: Emit a short beep if the beeper is enabled
gcode:
    {% set duration = params.DURATION|default(100)|int %}
    {% if 'output_pin beeper' in printer %}
        SET_PIN PIN=beeper VALUE=1
        G4 P{duration}
        SET_PIN PIN=beeper VALUE=0
    {% else %}
        {action_respond_info("Beeper pin not configured. Uncomment [output_pin beeper] in printer.cfg to enable.")}
    {% endif %}

[gcode_macro MAINTENANCE_POSITION]
description: Move the toolhead to a convenient position for maintenance
gcode:
    {% set x_mid = printer.toolhead.axis_maximum.x / 2 %}
    {% set y_mid = printer.toolhead.axis_maximum.y / 2 %}
    {% set z_safe = [printer.toolhead.axis_maximum.z * 0.6, 150] | min %}
    G28
    G90
    G1 X{x_mid} Y{y_mid} Z{z_safe} F3000
    M84 X Y                       ; Disable X/Y steppers, keep Z engaged
    M117 Ready for maintenance

[gcode_macro LEVEL_BED]
description: Run screws tilt adjust for manual bed leveling
gcode:
    G28
    SCREWS_TILT_CALCULATE
    M117 Adjust bed screws as indicated above
