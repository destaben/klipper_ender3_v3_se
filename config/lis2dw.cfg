[mcu btt_lis2dw]
serial: /dev/serial/by-id/usb-Klipper_rp2040_504434031071DE1C-if00

[lis2dw]
cs_pin: btt_lis2dw:gpio9
spi_software_sclk_pin: btt_lis2dw:gpio10
spi_software_mosi_pin: btt_lis2dw:gpio11
spi_software_miso_pin: btt_lis2dw:gpio8
axes_map: x,y,z

[resonance_tester]
accel_chip: lis2dw
probe_points:
  120,120,20

[temperature_sensor BTT_lis2dw]
sensor_type: temperature_mcu
sensor_mcu: btt_lis2dw
min_temp: 0
max_temp: 100

[shaketune]
result_folder: /home/klipper/config/ShakeTune_results