services:
  traefik:
    image: traefik:3.2
    restart: unless-stopped
    container_name: traefik
    command:
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
    ports:
      - "80:80"
    volumes:
      - "/var/run/docker.sock:/var/run/docker.sock:ro"
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 128M

  mainsail:
    image: ghcr.io/mainsail-crew/mainsail:v2.12.0
    restart: unless-stopped
    container_name: mainsail
    labels:
      traefik.enable: true
      traefik.http.services.mainsail.loadbalancer.server.port: 80
      traefik.http.routers.mainsail.rule: PathPrefix(`/`)
      traefik.http.routers.mainsail.entrypoints: web
      traefik.http.routers.mainsail.middlewares: mainsail-ratelimit
      traefik.http.middlewares.mainsail-ratelimit.ratelimit.average: 5
      traefik.http.middlewares.mainsail-ratelimit.ratelimit.burst: 10
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 384M
    depends_on: [moonraker]

  klipper:
    build:
      context: .
      dockerfile: Dockerfile-klipper
    restart: unless-stopped
    container_name: klipper
    privileged: true
    volumes:
      - /dev:/dev
      # Klipper configuration
      - ./config:/home/klipper/config
      - ./gcodes:/opt/printer_data/gcodes
      # Maintenance script
      - ./KlipperMaintenance/maintain.py:/home/klipper/klipper/klippy/extras/maintain.py
      # Chopper Resonance Tuner configuration
      - ./chopper-resonance-tuner/gcode_shell_command.py:/klipper/klippy/extras/gcode_shell_command.py
      - ./chopper-resonance-tuner:/home/klippy/chopper-resonance-tuner
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 384M

    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"

  moonraker:
    build:
      context: .
      dockerfile: Dockerfile-moonraker
    restart: unless-stopped
    container_name: moonraker
    pid: host
    labels:
      traefik.enable: true
      traefik.http.services.moonraker.loadbalancer.server.port: 7125
      traefik.http.routers.moonraker.rule: PathRegexp(`^/(websocket|printer|api|access|machine|server)`)
      traefik.http.routers.moonraker.entrypoints: web
      traefik.http.routers.moonraker.middlewares: moonraker-ratelimit
      traefik.http.middlewares.moonraker-ratelimit.ratelimit.average: 20
      traefik.http.middlewares.moonraker-ratelimit.ratelimit.burst: 40
    volumes:
      - /run/systemd:/run/systemd
      - /run/dbus:/run/dbus
      # Moonraker configuration
      - ./config:/opt/printer_data/config
      - ./moonraker/database:/opt/printer_data/database
      - ./moonraker/logs:/opt/printer_data/logs
      - ./gcodes:/opt/printer_data/gcodes
      # Timelapse configuration
      - ./moonraker-timelapse/component/timelapse.py:/opt/moonraker/moonraker/components/timelapse.py
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 384M

  node-exporter:
    image: prom/node-exporter:v1.9.1
    container_name: node-exporter
    restart: unless-stopped
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - '--path.procfs=/host/proc'
      - '--path.sysfs=/host/sys'
      - '--path.rootfs=/rootfs'
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 128M
      labels:
        traefik.enable: true
        traefik.http.services.nodeexporter.loadbalancer.server.port: 9100
        traefik.http.routers.nodeexporter.rule: PathPrefix(`/nodeexporter`)
        traefik.http.routers.nodeexporter.entrypoints: web
        traefik.http.routers.nodeexporter.middlewares: nodeexporter-ratelimit
        traefik.http.middlewares.nodeexporter-ratelimit.ratelimit.average: 1
        traefik.http.middlewares.nodeexporter-ratelimit.ratelimit.burst: 2

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.52.0
    container_name: cadvisor
    restart: unless-stopped
    command:
      - '-housekeeping_interval=10s'
      - '-docker_only=true'
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
    privileged: true
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 128M
      labels:
        traefik.enable: true
        traefik.http.services.cadvisor.loadbalancer.server.port: 8080
        traefik.http.routers.cadvisor.rule: PathPrefix(`/cadvisor`)
        traefik.http.routers.cadvisor.entrypoints: web
        traefik.http.routers.cadvisor.middlewares: cadvisor-ratelimit
        traefik.http.middlewares.cadvisor-ratelimit.ratelimit.average: 1
        traefik.http.middlewares.cadvisor-ratelimit.ratelimit.burst: 2

  usb-watcher:
    image: python:3.11-slim
    container_name: usb-watcher
    restart: unless-stopped
    volumes:
      - /dev:/dev
      - ./usb_watcher.py:/usb_watcher.py:ro
    environment:
      MOONRAKER_URL: "http://moonraker:7125"
      USB_ID: "1a86:7523,2341:0042"  # Change this to match your printer's VID:PID
    command: >
      sh -c "pip install pyudev requests && python /usb_watcher.py"
    deploy:
      resources:
        limits:
          cpus: '0.2'
          memory: 64M

  # ---------------------------------------------------------------------------
  # AI-based print monitoring (Tapo RTSP camera + Obico ML API)
  # ---------------------------------------------------------------------------
  # Set TAPO_RTSP_URL in a .env file or export it before running docker compose.
  # Example: TAPO_RTSP_URL=rtsp://admin:secret@192.168.1.100/stream1
  #
  # All three services below are optional. Remove any you don't need.
  # ---------------------------------------------------------------------------

  mediamtx:
    # Re-publishes the Tapo RTSP stream as HLS and WebRTC so Mainsail can
    # display it. HLS stream: http://<HOST_IP>:8888/tapo
    image: bluenviron/mediamtx:latest
    container_name: mediamtx
    restart: unless-stopped
    ports:
      - "8554:8554"   # RTSP re-publish
      - "8888:8888"   # HLS / WebRTC HTTP
    environment:
      MTX_PATHS_TAPO_SOURCE: "${TAPO_RTSP_URL:-}"
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 128M
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"

  obico-ml-api:
    # Runs the Obico (formerly The Spaghetti Detective) AI failure-detection
    # model locally. Listens on port 3333.
    image: thespaghettidetective/ml_api:latest
    container_name: obico-ml-api
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '1.5'
          memory: 1G
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"

  print-watcher:
    # Periodically captures a frame from the Tapo camera, sends it to the
    # Obico ML API, and optionally pauses the print when failures are detected.
    build:
      context: .
      dockerfile: Dockerfile-print-watcher
    container_name: print-watcher
    restart: unless-stopped
    environment:
      MOONRAKER_URL: "http://moonraker:7125"
      OBICO_ML_API_URL: "http://obico-ml-api:3333"
      # Set TAPO_RTSP_URL or TAPO_SNAPSHOT_URL (RTSP takes priority)
      TAPO_RTSP_URL: "${TAPO_RTSP_URL:-}"
      TAPO_SNAPSHOT_URL: "${TAPO_SNAPSHOT_URL:-}"
      # Seconds between detection runs (default: 10)
      DETECTION_INTERVAL: "${DETECTION_INTERVAL:-10}"
      # Failure score threshold 0–1; lower = more sensitive (default: 0.3)
      CONFIDENCE_THRESHOLD: "${CONFIDENCE_THRESHOLD:-0.3}"
      # Set to "true" to automatically pause when failures are detected
      ENABLE_AUTO_PAUSE: "${ENABLE_AUTO_PAUSE:-false}"
    depends_on: [moonraker, obico-ml-api]
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"
